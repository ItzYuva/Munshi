# Nginx reverse proxy for Munshi.
# Place at /etc/nginx/sites-available/munshi and symlink into sites-enabled.
# Replace munshi.yourdomain.com with your real domain.

server {
    listen 80;
    server_name munshi.yourdomain.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# After this works over HTTP, run:  sudo certbot --nginx -d munshi.yourdomain.com
# Certbot rewrites this file to add the HTTPS (443) server block automatically.
